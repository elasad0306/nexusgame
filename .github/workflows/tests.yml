# .github/workflows/tests.yml
# Pipeline CI/CD — NexusGame Test Suite
#
# TODO — Ce fichier est un squelette à compléter.
# Votre pipeline doit exécuter les tests dans le bon ordre.
# Documentez dans le README :
#   - Pourquoi cet ordre d'exécution ?
#   - Qu'avez-vous choisi de mettre dans la CI vs de laisser en local ?
#   - Pourquoi ce choix ?

name: NexusGame CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          # On installe les dépendances nécessaires à l'app et aux tests
          pip install flask pytest pytest-html pytest-cov

      - name: Lancer les tests unitaires
        run: |
          # On lance pytest avec la couverture de code (coverage) et la génération du rapport HTML
          pytest tests/test_unit.py -v --cov=app_gamestore --cov-report=html:reports/coverage --html=reports/unit.html --self-contained-html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit.html

  # ── Job 2 : Tests d'intégration ───────────────────────────────────────────
  integration-tests:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install flask pytest pytest-html requests

      - name: Lancer l'API et les tests
        run: |
          python app_gamestore.py & 
          # On attend que le port 5000 réponde avant de continuer
          timeout 30s bash -c 'until curl -s localhost:5000/health; do sleep 1; done'
          pytest tests/test_integration.py -v --html=reports/integration.html --self-contained-html

      - name: Uploader le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: reports/integration.html

  # ── Job 3 : Tests Newman ───────────────────────────────────────────────────
  api-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API et lancer Newman
        run: |
          pip install flask
          python app_gamestore.py &
          timeout 30s bash -c 'until curl -s localhost:5000/health; do sleep 1; done'
          newman run tests/gamestore_collection.json -r htmlextra --reporter-htmlextra-export reports/newman-report.html

      - name: Uploader le rapport Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/newman-report.html

  # ── Job 4 : Tests UI Playwright ────────────────────────────────────────────
  ui-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-playwright playwright
          playwright install chromium --with-deps

      - name: Lancer l'API et les tests UI
        run: |
          python app_gamestore.py &
          timeout 30s bash -c 'until curl -s localhost:5000/health; do sleep 1; done'
          pytest tests/test_ui.py -v --html=reports/ui-test.html --self-contained-html

      - name: Uploader les rapports et screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports
          path: |
            reports/ui-test.html
            test-results/